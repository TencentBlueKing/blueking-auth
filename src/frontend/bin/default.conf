server {
    root /var/www;
    index index.html index.htm;

    # Make site accessible from http://localhost/
    server_name localhost;

    # Enlarge this value to avoid "Request Header Or Cookie Too Large" error
    large_client_header_buffers 4 512k;

    # Cache hashed static assets (Vite output) for 1 week
    location ~* ^/web/.*\.(js|css|png|svg|jpg|jpeg|gif|ico|woff|woff2|ttf|eot)$ {
        expires 1w;
    }

    # SPA fallback: all /web/* routes → /web/index.html
    location /web/ {
        # Disable cache for index.html (contains runtime env placeholders)
        expires off;
        etag off;
        add_header Last-Modified "";

        try_files $uri $uri/ /web/index.html;
    }
}
